services:
  merino:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: merino_simulateur_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.merino.rule=Host(`merino.agenceaetheria.com`)"
      - "traefik.http.routers.merino.entrypoints=web,websecure"
      - "traefik.http.routers.merino.tls.certresolver=mytlschallenge"
      - "traefik.http.routers.merino.service=merino"
      - "traefik.http.services.merino.loadbalancer.server.port=3000"
      - "traefik.docker.network=n8n-stack_default"
    networks:
      - default
      - traefik_net

networks:
  default:
  traefik_net:
    external: true
    name: n8n-stack_default
